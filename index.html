<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Dev News Dashboard</title>
    <link rel="stylesheet" type="text/css" href="css/blog.css" />
</head>

<body>
    <div id="blog-dashboard">
        <div class="container">
            <header>
                <div class="header-title-container">
                    <h1>AI & DEV UPDATES</h1>
                    <p>매일 아침 9시, 인공지능 및 개발 생태계의 최신 소식을 전합니다.</p>
                </div>
            </header>

            <div class="dashboard-controls">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">전체</button>
                    <button class="filter-btn" data-filter="openai">OpenAI</button>
                    <button class="filter-btn" data-filter="google ai">Google AI</button>
                    <button class="filter-btn" data-filter="anthropic">Anthropic</button>
                    <button class="filter-btn" data-filter="cursor">Cursor</button>
                </div>

                <div class="sync-status">
                    <div class="sync-dot"></div>
                    <span id="sync-time-text">데이터 로딩 중...</span>
                </div>
            </div>

            <div id="news-grid" class="news-grid">
                <!-- 동적으로 뉴스 카드가 렌더링됩니다. -->
            </div>
        </div>
    </div>

    <!-- 상세 모달 -->
    <div id="news-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <div id="modal-badge-container"></div>
                <button class="close-btn" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-date" id="modal-date"></div>
                <h2 class="modal-title-ko" id="modal-title-ko"></h2>
                <div class="modal-title-en" id="modal-title-en"></div>
                
                <div class="modal-section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    한국어 번역 및 요약
                </div>
                <div class="modal-content-ko" id="modal-content-ko"></div>
                
                <div class="modal-section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg>
                    Original Summary
                </div>
                <div class="modal-content-en" id="modal-content-en"></div>
            </div>
            <div class="modal-footer">
                <a href="#" target="_blank" class="original-link-btn" id="modal-link">
                    원문 바로가기
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
                </a>
            </div>
        </div>
    </div>

    <script src="common/js/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
